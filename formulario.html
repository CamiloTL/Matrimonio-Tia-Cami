<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmación de Asistencia</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{

    width:100%;
    min-height:100%;

    background:#faf8f4;

    overflow-y:auto;
    overflow-x:hidden;

}

#contenedor{

    width:100%;
    height:100vh;

}

iframe{

    width:100%;
    height:100%;

    border:none;

}

</style>

</head>

<body>

<div id="contenedor">

<iframe
    data-tally-src="https://tally.so/embed/Bz6oAA?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
    loading="lazy"
    width="100%"
    height="2032"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    title="Confirmación de Asistencia - Nuestra Boda">
</iframe>

</div>

<script>

var d=document,
w="https://tally.so/widgets/embed.js",
v=function(){

    if(typeof Tally!=="undefined"){

        Tally.loadEmbeds();

    }else{

        d.querySelectorAll("iframe[data-tally-src]:not([src])")
        .forEach(function(e){

            e.src=e.dataset.tallySrc;

        });

    }

};

if(typeof Tally!=="undefined"){

    v();

}else if(d.querySelector('script[src="'+w+'"]')==null){

    var s=d.createElement("script");

    s.src=w;
    s.onload=v;
    s.onerror=v;

    d.body.appendChild(s);

}

</script>

</body>

</html>

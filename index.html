<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{

    width:100%;
    height:100dvh;

    margin:0;

    overflow:hidden;

    font-family:'Poppins',sans-serif;

    background:#faf8f4;

}
body{
    perspective:2200px;
    overflow:hidden;
}

#portada{
    position:fixed;
    inset:0;
    z-index:10;

    opacity:0;

    transform-origin:left center;
    transform-style:preserve-3d;

    transition:
        opacity .4s ease,
        transform 1.7s cubic-bezier(.22,.82,.17,1),
        box-shadow 1.7s ease;

    box-shadow:0 0 0 rgba(0,0,0,0);
}

#portada::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to right,
        rgba(0,0,0,.35),
        transparent 30%,
        transparent 70%,
        rgba(255,255,255,.15)
    );
    opacity:0;
    transition:opacity 1.7s;
    pointer-events:none;
}

#portada.abierta{

    transform:
        rotateY(-180deg);

    opacity:0;

    visibility:hidden;

    box-shadow:none;

    pointer-events:none;

    transition:
        transform 1.25s cubic-bezier(.22,.82,.17,1),
        opacity .35s linear 1.05s,
        visibility 0s linear 1.35s;

}

#portada.abierta::after{
    opacity:1;
}
#portada img{

    position:absolute;

    inset:0;

    width:100%;

    height:100%;

    display:block;

    object-fit:cover;

}
@keyframes zoomLento{
 from{transform:scale(1)}
 to{transform:scale(1.05)}
}

.destellos{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.destellos span{
 position:absolute;width:4px;height:4px;border-radius:50%;
 background:#f4d58d;opacity:0;animation:flotar 8s linear infinite;
}
.destellos span:nth-child(1){left:10%;top:95%;animation-delay:0s}
.destellos span:nth-child(2){left:20%;top:92%;animation-delay:1s}
.destellos span:nth-child(3){left:30%;top:88%;animation-delay:2s}
.destellos span:nth-child(4){left:40%;top:94%;animation-delay:3s}
.destellos span:nth-child(5){left:50%;top:90%;animation-delay:4s}
.destellos span:nth-child(6){left:60%;top:93%;animation-delay:5s}
.destellos span:nth-child(7){left:70%;top:89%;animation-delay:6s}
.destellos span:nth-child(8){left:80%;top:95%;animation-delay:7s}
.destellos span:nth-child(9){left:15%;top:82%;animation-delay:2s}
.destellos span:nth-child(10){left:85%;top:80%;animation-delay:4s}
.destellos span:nth-child(11){left:35%;top:78%;animation-delay:6s}
.destellos span:nth-child(12){left:65%;top:76%;animation-delay:1s}

@keyframes flotar{
 0%{opacity:0;transform:translateY(0)}
 20%{opacity:.8}
 80%{opacity:.8}
 100%{opacity:0;transform:translateY(-250px)}
}

.sello-btn{
 position:absolute;
 width:120px;height:120px;
 left:50%;top:90%;
 transform:translate(-50%,-50%);
 border-radius:100%;
 cursor:pointer;z-index:20;
 -webkit-tap-highlight-color: transparent;
}

.indicacion{
  font-family: "Aoboshi One", serif;
 position:absolute;
 left:50%;top:80.5%;
 transform:translateX(-50%);
 color:white;
 text-shadow:0 2px 8px rgba(0,0,0,.45);
 animation:respirar 2.5s ease-in-out infinite;
 z-index:21;
 white-space:nowrap;
}
@keyframes respirar{
 0%{opacity:.4}
 50%{opacity:1}
 100%{opacity:.4}
}

#carta{

    position:fixed;
    inset:0;

    background:#faf8f4;

    z-index:1;

    opacity:0;

    transform:scale(.98);

    transition:
        opacity .8s ease .45s,

    overflow-x:hidden;

}
.imagen-carta{

    width:100%;

    height:auto;

}

.invitacion{

    position:relative;

    width:100%;

}

.imagen-carta{

    width:100%;

    display:block;

}


#contador{

.tiempo{

.tiempo span{

#overlay{

#overlay.activo{

}

#modal{

    top:50%;

    background:white;

    border-radius:26px;

}

#modal.activo{

    opacity:1;

    visibility:visible;

#cerrarModal{

    position:absolute;

    height:34px;

.calendario{

.calendario h2{

    color:#3f6d54;

}

.anio{

    color:#888;

    display:block;

}

.diasSemana,
.diasMes{

    display:grid;

    grid-template-columns:repeat(7,1fr);

    gap:10px;

}

.diasSemana span{

    font-weight:700;

}

.diasMes span{

    width:100%;

    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

    border-radius:50%;

#diaBoda{

    background:#c6a55b;

    color:white;

    font-weight:bold;

    transform:scale(0);

}

#diaBoda.pop{

    animation:pop .5s forwards;

}

@keyframes pop{

0%{

transform:scale(0);

}

60%{

transform:scale(1.25);

}

100%{

transform:scale(1);

}

}

#mensajeBoda{

    opacity:0;

    margin-top:25px;

    color:#3f6d54;

    font-size:20px;

    font-weight:600;

    transition:.6s;

}

#mensajeBoda.mostrar{

    opacity:1;

}

#zonas{

    position:absolute;

    inset:0;

    z-index:300;

}

#zonas button,
#zonas a{

    position:absolute;

    background:transparent;

    border:none;

    cursor:pointer;
}

/* FECHA */

#btnFecha{

    left:16.5%;

    top:27%;

    width:20%;

    height:9%;

    border-radius: 30%;

    -webkit-tap-highlight-color: transparent;

/* HORA */

/*====================*/
/* RELOJ */
/*====================*/

.horaModal{

}

.horaModal h2{

.reloj{

    position:relative;

    margin:auto;

    border-radius:50%;

    background:white;

    box-shadow:0 8px 30px rgba(0,0,0,.15);

}

/* Centro */

.centro{

    position:absolute;

    width:14px;

    background:#c6a55b;

    border-radius:50%;

    left:50%;

}

.separador{

}

.descripcionEvento{

    text-align:left;

}

.horaEvento{

    font-family: "Aoboshi One", serif;

    margin-right:20%;

    text-align:right;

}

.descripcionEvento{

    margin-left:25%;

</style>

<script>

function abrirCarta(){

    const sello=document.getElementById("sello");
    const portada=document.getElementById("portada");
    const carta=document.getElementById("carta");

    sello.style.transform="translate(-50%,-50%) scale(.82)";

    setTimeout(()=>{

        carta.classList.add("visible");

        portada.classList.add("abierta");

        setTimeout(()=>{

            portada.style.display="none";

        },1400);

    },180);

}


// =======================
// CUENTA REGRESIVA
// =======================

const fechaBoda = new Date("2026-09-26T17:00:00").getTime();

function actualizarCuenta(){

    const ahora = new Date().getTime();

    const diferencia = fechaBoda - ahora;

    if(diferencia <= 0){

        document.getElementById("dias").textContent="000";
        document.getElementById("horas").textContent="00";
        document.getElementById("minutos").textContent="00";
        document.getElementById("segundos").textContent="00";

        return;
    }

    const dias=Math.floor(diferencia/(1000*60*60*24));

    const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

    const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));

    const segundos=Math.floor((diferencia%(1000*60))/1000);

    document.getElementById("dias").textContent=dias;
    document.getElementById("horas").textContent=String(horas).padStart(2,"0");
    document.getElementById("minutos").textContent=String(minutos).padStart(2,"0");
    document.getElementById("segundos").textContent=String(segundos).padStart(2,"0");

}

actualizarCuenta();

setInterval(actualizarCuenta,1000);
